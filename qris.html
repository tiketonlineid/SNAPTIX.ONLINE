<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QRIS Pembayaran - LevelUp_Fest Tegal</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(180deg,#07142B,#020817);
color:#fff;
padding:20px;
}

.container{
max-width:550px;
margin:auto;
}

.card{
background:#0D1D3A;
border-radius:25px;
padding:20px;
box-shadow:0 0 30px rgba(17,216,255,.15);
border:1px solid rgba(255,255,255,.05);
}

.logo{
text-align:center;
margin-bottom:15px;
}

.logo img{
height:80px;
max-width:100%;
}

.banner{
width:100%;
border-radius:20px;
margin-bottom:15px;
}

.title{
text-align:center;
font-size:28px;
font-weight:800;
margin-bottom:5px;
}

.status{
text-align:center;
color:#11D8FF;
font-weight:700;
margin-bottom:15px;
}

.info{
background:#081428;
padding:12px;
border-radius:14px;
margin-bottom:10px;
}

.info span{
color:#11D8FF;
font-weight:bold;
}

.timer{
text-align:center;
font-size:55px;
font-weight:800;
color:#11D8FF;
margin:15px 0;
}

.qrbox{
background:#081428;
padding:15px;
border-radius:18px;
text-align:center;
margin:15px 0;
}

.qrbox img{
width:100%;
max-width:320px;
border-radius:12px;
}

.total{
text-align:center;
font-size:45px;
font-weight:800;
color:#11D8FF;
margin-top:10px;
}

.label{
font-size:14px;
color:#cbd5e1;
margin-top:10px;
}

.upload{
margin-top:20px;
}

input[type=file]{
width:100%;
padding:12px;
background:#081428;
border:none;
border-radius:12px;
color:white;
}

.preview{
display:none;
width:100%;
margin-top:15px;
border-radius:12px;
}

.check{
margin-top:15px;
font-size:16px;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
margin-top:20px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:#11D8FF;
color:#001;
}

.btn:hover{
opacity:.9;
}

#loadingScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#07142B;
z-index:99999;
justify-content:center;
align-items:center;
flex-direction:column;
padding:30px;
}

.progressWrap{
width:100%;
max-width:400px;
height:20px;
background:#0D1D3A;
border-radius:999px;
overflow:hidden;
}

.progressBar{
height:100%;
width:0%;
background:#11D8FF;
transition:.5s;
}

#percent{
font-size:42px;
color:#11D8FF;
margin-top:15px;
}

#loadingText{
margin-top:15px;
text-align:center;
}

@media(max-width:600px){

.timer{
font-size:48px;
}

.total{
font-size:38px;
}

.title{
font-size:24px;
}

}
</style>

</head>
<body>

<div class="container">

<div class="card">

<div class="logo">
<img src="logo-event.png">
</div>

<img src="banner-event.png" class="banner">

<div class="title">
LevelUp_Fest Tegal
</div>

<div class="status">
MENUNGGU PEMBAYARAN
</div>

<div class="info">
Invoice :
<span id="invoice"></span>
</div>

<div class="info">
Nomor Registrasi :
<span id="registrasi"></span>
</div>

<div class="timer" id="timer">
30:00
</div>

<div class="qrbox">

<div class="label">
SCAN QRIS PEMBAYARAN
</div>

<img src="qris-pembayaran9.png">

<div class="label">
TOTAL PEMBAYARAN
</div>

<div class="total">
Rp150.000
</div>

</div>

<div class="check">
<label>
<input type="checkbox" id="agree">
Saya telah melakukan pembayaran
</label>
</div>

<div class="upload">

<input
type="file"
id="bukti"
accept="image/*">

<img
id="preview"
class="preview">

</div>

<button
class="btn"
onclick="konfirmasiPembayaran()">

KONFIRMASI PEMBAYARAN

</button>

</div>

</div>

<div id="loadingScreen">

<h2 style="color:#11D8FF;">
Verifikasi Pembayaran
</h2>

<br>

<div class="progressWrap">
<div
class="progressBar"
id="progressBar">
</div>
</div>

<div id="percent">
0%
</div>

<div id="loadingText">
Memvalidasi Transaksi...
</div>

</div>

<script>

/* EMAILJS PLACEHOLDER */

emailjs.init({
publicKey:"YOUR_PUBLIC_KEY"
});

/* NOMOR REGISTRASI */

const registrasi=
"LVUP-2026-"+
Math.floor(
100000+
Math.random()*900000
);

document.getElementById(
"registrasi"
).innerHTML=registrasi;

/* INVOICE */

document.getElementById(
"invoice"
).innerHTML=
"INV-"+Date.now()
.toString()
.slice(-8);

/* TIMER */

let time=1800;

setInterval(()=>{

if(time<=0)return;

time--;

let m=
Math.floor(time/60);

let s=
time%60;

document.getElementById(
"timer"
).innerHTML=
String(m)
.padStart(2,'0')
+
":"
+
String(s)
.padStart(2,'0');

},1000);

/* PREVIEW */

document
.getElementById("bukti")
.addEventListener(
"change",
function(e){

const file=
e.target.files[0];

if(!file)return;

const url=
URL.createObjectURL(file);

const img=
document.getElementById(
"preview"
);

img.src=url;
img.style.display="block";

}
);

/* KONFIRMASI */

function konfirmasiPembayaran(){

const agree=
document.getElementById(
"agree"
);

const bukti=
document.getElementById(
"bukti"
);

if(!agree.checked){

alert(
"Centang konfirmasi pembayaran"
);

return;
}

if(
bukti.files.length===0
){

alert(
"Upload bukti pembayaran terlebih dahulu"
);

return;
}

document
.getElementById(
"loadingScreen"
)
.style.display=
"flex";

const pesan=[

"Memvalidasi Transaksi...",

"Menghubungkan Server Pembayaran...",

"Memeriksa Bukti Pembayaran...",

"Sinkronisasi Data Peserta...",

"Membuat Nomor Registrasi...",

"Mengirim Email Admin...",

"Mengirim Auto Reply...",

"Data Berhasil Diverifikasi..."

];

let persen=0;
let step=0;

const proses=
setInterval(()=>{

persen+=15;

if(persen>100)
persen=100;

document
.getElementById(
"progressBar"
)
.style.width=
persen+"%";

document
.getElementById(
"percent"
)
.innerHTML=
persen+"%";

if(step<pesan.length){

document
.getElementById(
"loadingText"
)
.innerHTML=
pesan[step];

step++;

}

},1500);

/* EMAILJS */

emailjs.send(

"YOUR_SERVICE_ID",

"YOUR_TEMPLATE_ID",

{

registrasi:
registrasi,

invoice:
document.getElementById(
"invoice"
).innerHTML

}

).catch(()=>{});

/* REDIRECT */

setTimeout(()=>{

clearInterval(
proses
);

localStorage.setItem(
"registrasi",
registrasi
);

window.location.href=
"status.html";

},12000);

}

</script>

</body>
</html>
